name: IntelliPlant CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        cd intelliplant-api
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black bandit pytest
        
    - name: Run Black (Formatting)
      run: |
        cd intelliplant-api
        black --check .
        
    - name: Run Flake8 (Linting)
      run: |
        cd intelliplant-api
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
        
    - name: Run Bandit (Security)
      run: |
        cd intelliplant-api
        bandit -r . -lll
        
    - name: Run Pytest
      run: |
        cd intelliplant-api
        pytest

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        
    - name: Install dependencies
      run: |
        cd intelliplant-web
        npm ci
        
    - name: Run ESLint (Quality & a11y)
      run: |
        cd intelliplant-web
        npm run lint
